<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login – AiManager</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--pink:#FF6B9D;--purple:#A855F7;--orange:#FF9A3C;--green:#22C55E;--text:#1A1A2E;--muted:#6B7280;--radius:20px;}
body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,#FFF0F6 0%,#F3E8FF 50%,#EFF6FF 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
.back{position:fixed;top:20px;left:24px;color:var(--muted);text-decoration:none;font-weight:700;font-size:.9rem;}
.back:hover{color:var(--pink);}
.logo{font-size:1.6rem;font-weight:900;background:linear-gradient(135deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:28px;}
.login-card{background:#fff;border-radius:var(--radius);padding:36px 32px;width:100%;max-width:400px;box-shadow:0 16px 50px rgba(0,0,0,.1);animation:up .4s ease;}
@keyframes up{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.login-card h2{font-size:1.4rem;font-weight:900;margin-bottom:6px;}
.login-card p{color:var(--muted);font-size:.88rem;margin-bottom:28px;}
.form-group{margin-bottom:18px;}
.form-group label{display:block;font-weight:700;font-size:.88rem;margin-bottom:7px;}
.form-group input{width:100%;padding:13px 16px;border:2px solid #E5E7EB;border-radius:12px;font-family:'Nunito',sans-serif;font-size:.9rem;color:var(--text);outline:none;transition:.2s;}
.form-group input:focus{border-color:var(--pink);}
.forgot{text-align:right;margin-top:-10px;margin-bottom:18px;}
.forgot a{font-size:.82rem;color:var(--pink);font-weight:700;text-decoration:none;}
.btn-login{width:100%;padding:14px;background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;border:none;border-radius:50px;font-family:'Nunito',sans-serif;font-weight:800;font-size:1rem;cursor:pointer;transition:.2s;}
.btn-login:hover{opacity:.88;}
.divider{text-align:center;color:var(--muted);font-size:.83rem;margin:18px 0;position:relative;}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:#E5E7EB;}
.divider::before{left:0;}.divider::after{right:0;}
.type-switch{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.type-btn{padding:10px;background:#F9FAFB;border:2px solid #E5E7EB;border-radius:12px;font-family:'Nunito',sans-serif;font-weight:700;font-size:.85rem;cursor:pointer;transition:.2s;}
.type-btn.active,.type-btn:hover{border-color:var(--pink);background:#FFF0F6;color:var(--pink);}
.register-link{text-align:center;font-size:.87rem;color:var(--muted);margin-top:18px;}
.register-link a{color:var(--pink);font-weight:700;text-decoration:none;}
</style>
</head>
<body>
<a href="index.html" class="back">← Home</a>
<div class="logo">✨ AiManager</div>
<div class="login-card">
  <h2>Welcome back! 👋</h2>
  <p>Login to your AiManager account</p>
  <div class="type-switch">
    <button class="type-btn active" onclick="setType(this,'owner')">🏪 Shop Owner</button>
    <button class="type-btn" onclick="setType(this,'customer')">👤 Customer</button>
  </div>
  <div class="form-group"><label>Email Address</label><input type="email" placeholder="you@example.com" id="email"/></div>
  <div class="form-group"><label>Password</label><input type="password" placeholder="Your password" id="pass"/></div>
  <div class="forgot"><a href="#">Forgot password?</a></div>
  <button class="btn-login" onclick="doLogin()">Login →</button>
  <div class="register-link">Don't have an account? <a href="register.html">Create one free</a></div>
</div>
<script>
let loginType = 'owner';
function setType(btn, type){
  loginType = type;
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
async function doLogin(){
  const email = document.getElementById('email').value;
  const pass = document.getElementById('pass').value;
  if (!email || !pass) { alert('Enter email and password'); return; }

  const res = await fetch('/api/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password: pass })
  });

  const data = await res.json();
  if (!data.access_token) {
    alert('Wrong email or password!');
    return;
  }

  localStorage.setItem('token', data.access_token);
  location.href = 'dashboard.html';
}

</script>
</body>
</html>
